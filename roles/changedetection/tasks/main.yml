---

- block:

    - name: install podman and acl
      ansible.builtin.apt:
        name:
          - podman
          - acl  # needed by ansible to become an unprivileged user
        update_cache: true
        cache_valid_time: 3600

    - name: ensure changedetection group exits
      ansible.builtin.group:
        name: changedetection

    - name: ensure changedetection user exists and has restrictive settings
      ansible.builtin.user:
        name: changedetection
        groups: changedetection
        password: "*"
        home: "{{ changedetection_dir }}"
        shell: /usr/sbin/nologin

    - name: check if changedetection user is lingering
      ansible.builtin.stat:
        path: "/var/lib/systemd/linger/changedetection"
      register: changedetection_user_lingering

    - name: enable linger for changedetection user
      ansible.builtin.command: "loginctl enable-linger changedetection"
      when: not changedetection_user_lingering.stat.exists

  become: "{{ changedetection_become }}"
  become_user: "{{ changedetection_become_user }}"

- block:

    - name: old changedetection container service must be stopped and disabled
      ansible.builtin.systemd:
        name: container-changedetection
        state: stopped
        enabled: false
        scope: user
      failed_when: false

    - name: old changedetection container must be absent
      containers.podman.podman_container:
        name: changedetection
        state: absent

    - name: ensure the changedetection pod exist
      containers.podman.podman_pod:
        name: changedetection
        state: created
        ports:
          - "{{ changedetection_host_ip }}:{{ changedetection_host_port }}:5000"

    - name: ensure the changedetection app container exist, stopped
      containers.podman.podman_container:
        pod: changedetection
        name: changedetection-app
        image: "docker.io/dgtlmoon/changedetection.io:{{ changedetection_tag }}"
        env: "{{ {'PLAYWRIGHT_DRIVER_URL': changedetection_browser_url} if changedetection_browser else {} }}"
        volume:
          - "changedetection-data:/datastore"
        state: stopped

    - name: ensure the changedetection browser container exist, stopped
      containers.podman.podman_container:
        pod: changedetection
        name: changedetection-browser
        image: "docker.io/dgtlmoon/sockpuppetbrowser:{{ changedetection_browser_tag }}"
        cap_add:
          - SYS_ADMIN
        env:
          SCREEN_WIDTH: "{{ changedetection_browser_screen_width }}"
          SCREEN_HEIGHT: "{{ changedetection_browser_screen_height }}"
          SCREEN_DEPTH: "{{ changedetection_browser_screen_depth }}"
          MAX_CONCURRENT_CHROME_PROCESSES: "{{ changedetection_browser_max_concurrent_chrome_processes }}"
        state: stopped
      when: changedetection_browser

    - name: systemd unit files for changedetection pod must exist
      containers.podman.podman_generate_systemd:
        name: changedetection
        dest: ~/.config/systemd/user/

    - name: changedetection pod must be started and enabled on systemd
      ansible.builtin.systemd:
        name: pod-changedetection
        daemon_reload: true
        state: started
        enabled: true
        scope: user

  become: true
  become_user: changedetection
