---
forgejo_become: true
forgejo_become_user: root

forgejo_dir: /srv/forgejo
forgejo_web_address: 127.0.0.1
forgejo_ssh_address: 127.0.0.1
# Optionally also publish on an IPv6 address (e.g. "::1" or a public address).
# Leave empty to publish only on the IPv4 addresses above.
forgejo_web_address6: ""
forgejo_ssh_address6: ""
forgejo_web_port: 8080
forgejo_ssh_port: 2222
forgejo_tag: 15

forgejo_postgres_database_tag: 14
forgejo_postgres_password: secret

forgejo_pod_ports: >-
  {{
    ["%s:%s:3000" | format(forgejo_web_address, forgejo_web_port),
     "%s:%s:22" | format(forgejo_ssh_address, forgejo_ssh_port)]
    + (["[%s]:%s:3000" | format(forgejo_web_address6, forgejo_web_port)]
       if forgejo_web_address6 | length > 0 else [])
    + (["[%s]:%s:22" | format(forgejo_ssh_address6, forgejo_ssh_port)]
       if forgejo_ssh_address6 | length > 0 else [])
  }}
